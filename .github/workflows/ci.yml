name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Check Node 20 compatibility
        if: matrix.node-version == 20
        run: npm run check:compat
      - name: Check coverage and critical paths
        if: matrix.node-version == 22
        run: npm run check
      - run: npm audit --audit-level=high
